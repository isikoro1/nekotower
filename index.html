<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ねこ器タワー</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell">
        <canvas id="game" width="900" height="1200" aria-label="cat bowl physics game"></canvas>

        <div class="game-hud" aria-label="game status">
          <span>Score <strong id="hudScore">0</strong></span>
          <span>Best <strong id="hudBest">0</strong></span>
          <span id="hudTurn">Solo</span>
        </div>

        <section class="overlay title-screen" id="titleScreen" aria-label="title screen">
          <h2>ねこ器タワー</h2>
          <div class="title-cats" id="titleCats" aria-hidden="true"></div>
          <div class="stage-buttons">
            <button id="stageBowlBtn" type="button">お椀</button>
            <button id="stagePlatformBtn" type="button">平台</button>
            <button id="stageTowerBtn" type="button">キャットタワー</button>
            <button id="stageBottleBtn" type="button">猫瓶</button>
          </div>
        </section>

        <section class="overlay game-over-screen" id="gameOverScreen" aria-label="game over" hidden>
          <h2>GAME OVER</h2>
          <p id="gameOverMessage">終了</p>
          <button id="retryBtn" type="button">リトライ</button>
          <button id="toTitleBtn" type="button">タイトルへ</button>
        </section>

        <div class="touch-controls" aria-label="touch controls">
          <button id="rotLeftBtn" type="button">↺</button>
          <button id="dropBtn" type="button">Drop</button>
          <button id="rotRightBtn" type="button">↻</button>
        </div>
      </section>
    </main>

    <script src="./vendor/decomp.min.js"></script>
    <script src="./vendor/matter.min.js"></script>
    <script src="./src/cats.js"></script>
    <script src="./src/cat-shapes.js"></script>
    <script src="./src/cat-contours.js"></script>
    <script src="./src/cat-hitboxes.js"></script>
    <script src="./src/game.js"></script>
  </body>
</html>
