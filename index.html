<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ねこタワー</title>
    <link rel="stylesheet" href="./styles.css?v=20260613-2" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell">
        <canvas id="game" width="900" height="1200" aria-label="cat bowl physics game"></canvas>

        <div class="game-hud" aria-label="game status">
          <span>Score <strong id="hudScore">0</strong></span>
          <span>Best <strong id="hudBest">0</strong></span>
          <span id="hudTurn">Solo</span>
        </div>

        <section class="overlay title-screen" id="titleScreen" aria-label="title screen">
          <h2>ねこタワー</h2>
          <div class="title-menu" id="titleMenu">
            <div class="title-cats" id="titleCats" aria-hidden="true"></div>
            <div class="stage-buttons">
              <button id="stageBowlBtn" type="button">お椀</button>
              <button id="stagePlatformBtn" type="button">平台</button>
              <button id="stageTowerBtn" type="button">キャットタワー</button>
              <button id="stageBottleBtn" type="button">猫瓶</button>
            </div>
            <button id="howToBtn" class="wide-button" type="button">遊び方</button>
          </div>
          <div class="howto-panel" id="howToPanel" hidden>
            <h3>遊び方</h3>
            <p>猫を落として、ステージから落とさずに何匹積めるかを競います。</p>
            <div class="controls-guide">
              <section>
                <h4>スマホ</h4>
                <ul>
                  <li>ドラッグ: 左右移動</li>
                  <li>左右の丸ボタン: 回転</li>
                  <li>Dropボタン: 落下</li>
                </ul>
              </section>
              <section>
                <h4>PC</h4>
                <ul>
                  <li>A・Dキー / マウス移動: 左右移動</li>
                  <li>Q・E / ←・→ / ホイール: 回転</li>
                  <li>Space / 左クリック: 落下</li>
                </ul>
              </section>
            </div>
            <p>高速回転中に落とすと、回転方向へカーブします。</p>
            <button id="howToBackBtn" type="button">戻る</button>
          </div>
        </section>

        <section class="overlay game-over-screen" id="gameOverScreen" aria-label="game over" hidden>
          <h2>GAME OVER</h2>
          <p id="gameOverMessage">終了</p>
          <button id="retryBtn" type="button">リトライ</button>
          <button id="toTitleBtn" type="button">タイトルへ</button>
        </section>

        <div class="touch-controls" aria-label="touch controls">
          <button id="rotLeftBtn" type="button">↺</button>
          <button id="dropBtn" type="button">Drop</button>
          <button id="rotRightBtn" type="button">↻</button>
        </div>
      </section>
    </main>

    <script src="./vendor/decomp.min.js?v=20260613-2"></script>
    <script src="./vendor/matter.min.js?v=20260613-2"></script>
    <script src="./src/cats.js?v=20260613-2"></script>
    <script src="./src/cat-shapes.js?v=20260613-2"></script>
    <script src="./src/cat-contours.js?v=20260613-2"></script>
    <script src="./src/cat-hitboxes.js?v=20260613-2"></script>
    <script src="./src/game.js?v=20260613-2"></script>
  </body>
</html>
